<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrada Bank - Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fundo-principal': '#0B0D17',
                        'fundo-painel': '#131521',
                        'fundo-cartao': '#1B1E2D',
                        'verde-primario': '#00C389',
                        'verde-saldo': '#138D63',
                        'azul-pix': '#3B82F6',
                        'roxo-emprestimo': '#A855F7',
                        'laranja-boleto': '#F97316',
                        'texto-secundario': '#9CA3AF'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-fundo-principal text-white h-screen flex flex-col md:flex-row overflow-hidden fonte-padrao relative">

    <input type="checkbox" id="menu-mobile" class="peer hidden">

    <label for="menu-mobile" class="fixed inset-0 bg-black/70 z-40 hidden peer-checked:block md:hidden cursor-pointer"></label>

    <aside class="fixed inset-y-0 left-0 w-64 bg-fundo-principal border-r border-gray-800 flex flex-col justify-between p-6 z-50 transform -translate-x-full transition-transform duration-300 peer-checked:translate-x-0 md:relative md:translate-x-0">
        
        <label for="menu-mobile" class="md:hidden absolute top-5 right-5 text-texto-secundario cursor-pointer hover:text-white">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </label>

        <div>
            <div class="flex items-center gap-1 mb-10 mt-2 md:mt-0">
                <h1 class="text-2xl font-bold">Estrada<span class="text-verde-primario">Bank</span></h1>
            </div>

            <nav class="flex flex-col gap-2">
                <a href="#" class="flex items-center gap-3 bg-fundo-cartao border border-gray-700 text-verde-primario px-4 py-3 rounded-lg font-medium transition-cores">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    Painel Principal
                </a>
                
                <a href="#" class="flex items-center gap-3 text-texto-secundario hover:text-white px-4 py-3 rounded-lg font-medium transition-cores">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Antecipações CT-e
                </a>
                <a href="#" class="flex items-center gap-3 text-texto-secundario hover:text-white px-4 py-3 rounded-lg font-medium transition-cores">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                    Cartão RodoFuel
                </a>
                <a href="#" class="flex items-center gap-3 text-texto-secundario hover:text-white px-4 py-3 rounded-lg font-medium transition-cores">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
                    Km Premiado
                </a>
            </nav>
        </div>

        <div>
            <a href="#" class="flex items-center gap-3 text-texto-secundario hover:text-white px-4 py-3 rounded-lg font-medium transition-cores">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Configurações
            </a>
        </div>
    </aside>

    <main class="flex-1 bg-fundo-painel flex flex-col p-6 overflow-y-auto area-rolagem relative w-full">
        
        <div class="md:hidden flex justify-center w-full mb-8 mt-2">
            <h1 class="text-2xl font-bold">Estrada<span class="text-verde-primario">Bank</span></h1>
        </div>

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            
            <div class="flex items-center justify-between w-full md:w-auto">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-verde-primario flex items-center justify-center font-bold text-fundo-principal cursor-pointer hover:bg-green-400">
                        ES
                    </div>
                    <h2 class="text-xl md:text-2xl font-semibold">Olá, Eduardo Silva</h2>
                </div>
                
                <label for="menu-mobile" class="md:hidden text-texto-secundario cursor-pointer hover:text-white ml-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </label>
            </div>
            
            <div class="w-full md:w-auto mt-2 md:mt-0">
                <div class="relative w-full md:w-64">
                    <svg class="w-5 h-5 absolute left-3 top-2.5 text-texto-secundario" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" placeholder="Buscar transações..." class="w-full bg-fundo-cartao border border-gray-700 text-sm rounded-lg pl-10 pr-4 py-2.5 focus:outline-none focus:border-verde-primario placeholder-texto-secundario">
                </div>
            </div>
        </header>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            
            <div class="lg:col-span-2 bg-verde-saldo rounded-2xl p-6 flex flex-col justify-between cartao-sombra">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-green-100 font-medium">Saldo Disponível</p>
                    <button class="text-green-100 hover:text-white transition-cores">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    </button>
                </div>
                <div>
                    <h3 class="text-4xl md:text-5xl font-bold mb-3">R$ 45.250,50</h3>
                    <a href="#" class="text-green-100 underline text-sm hover:text-white">Ver extrato</a>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="bg-azul-pix rounded-xl p-4 flex flex-col items-center justify-center gap-2 hover:opacity-90 cartao-sombra">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    <span class="text-sm font-medium">Pix</span>
                </button>
                <button class="bg-verde-primario rounded-xl p-4 flex flex-col items-center justify-center gap-2 hover:opacity-90 cartao-sombra">
                    <svg class="w-8 h-8 text-fundo-principal" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span class="text-sm font-medium text-fundo-principal">Antecipação</span>
                </button>
                <button class="bg-roxo-emprestimo rounded-xl p-4 flex flex-col items-center justify-center gap-2 hover:opacity-90 cartao-sombra">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <span class="text-sm font-medium">Empréstimos</span>
                </button>
                <button class="bg-laranja-boleto rounded-xl p-4 flex flex-col items-center justify-center gap-2 hover:opacity-90 cartao-sombra">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2zM10 8.5a.5.5 0 11-1 0 .5.5 0 011 0zm5 5a.5.5 0 11-1 0 .5.5 0 011 0z"></path></svg>
                    <span class="text-sm font-medium text-center">Boletos</span>
                </button>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-6">
            
            <div class="bg-fundo-cartao rounded-2xl p-6 cartao-sombra flex flex-col h-80">
                <h3 class="text-lg font-semibold mb-6 text-center">Ganhos x Gastos com Caminhão<br><span class="text-sm text-gray-400">(Mês Atual)</span></h3>
                
                <div class="flex-1 flex items-end gap-2 relative mt-4 mx-4 border-b border-gray-600">
                    
                    <div class="absolute w-full border-b border-gray-700 bottom-1/4"></div>
                    <div class="absolute w-full border-b border-gray-700 bottom-2/4"></div>
                    <div class="absolute w-full border-b border-gray-700 bottom-3/4"></div>
                    
                    <div class="absolute -left-10 h-full flex flex-col justify-between text-xs text-gray-400">
                        <span>6000</span>
                        <span>4500</span>
                        <span>3000</span>
                        <span>1500</span>
                        <span>0</span>
                    </div>

                    <div class="w-full flex justify-center items-end gap-1 z-10">
                        <div class="w-3/5 bg-verde-primario rounded-t h-16 coluna-grafico"></div>
                        <div class="w-3/5 bg-roxo-emprestimo rounded-t h-10 coluna-grafico"></div>
                    </div>
                    <div class="w-full flex justify-center items-end gap-1 z-10">
                        <div class="w-3/5 bg-verde-primario rounded-t h-14 coluna-grafico"></div>
                        <div class="w-3/5 bg-roxo-emprestimo rounded-t h-8 coluna-grafico"></div>
                    </div>
                    <div class="w-full flex justify-center items-end gap-1 z-10">
                        <div class="w-3/5 bg-verde-primario rounded-t h-20 coluna-grafico"></div>
                        <div class="w-3/5 bg-roxo-emprestimo rounded-t h-12 coluna-grafico"></div>
                    </div>
                    <div class="w-full flex justify-center items-end gap-1 z-10">
                        <div class="w-3/5 bg-verde-primario rounded-t h-24 coluna-grafico"></div>
                        <div class="w-3/5 bg-roxo-emprestimo rounded-t h-16 coluna-grafico"></div>
                    </div>
                    <div class="w-full flex justify-center items-end gap-1 z-10">
                        <div class="w-3/5 bg-verde-primario rounded-t h-28 coluna-grafico"></div>
                        <div class="w-3/5 bg-roxo-emprestimo rounded-t h-20 coluna-grafico"></div>
                    </div>
                    <div class="w-full flex justify-center items-end gap-1 z-10">
                        <div class="w-3/5 bg-verde-primario rounded-t h-32 coluna-grafico"></div>
                        <div class="w-3/5 bg-roxo-emprestimo rounded-t h-24 coluna-grafico"></div>
                    </div>
                </div>
            </div>

            <div class="bg-fundo-cartao rounded-2xl p-6 cartao-sombra flex flex-col items-center">
                <h3 class="text-lg font-semibold w-full text-left mb-6">Seu Cartão RodoFuel</h3>
                
                <div class="w-full max-w-sm h-48 bg-gray-800 border border-gray-700 rounded-xl p-6 flex flex-col justify-between sombra-interna-cartao hover:scale-105 transition-transform">
                    <div class="flex justify-between items-start">
                        <div class="w-10 h-8 bg-yellow-500 rounded border border-yellow-600 flex flex-col justify-center p-1">
                            <div class="w-full border-b border-yellow-700 mb-1"></div>
                            <div class="w-full border-b border-yellow-700"></div>
                        </div>
                        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                    </div>
                    
                    <div>
                        <p class="text-xs text-gray-400 mb-1">Número do Cartão</p>
                        <p class="font-mono text-xl tracking-widest text-white">
                            <span class="text-gray-500">•••• •••• •••• </span>8472
                        </p>
                    </div>
                </div>
            </div>

        </section>
    </main>

</body>
</html>
